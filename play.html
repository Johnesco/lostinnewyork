<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lostinnewyork</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0908;
  color: #d4c5a9;
  font-family: Georgia, "Times New Roman", serif;
  line-height: 1.7;
  min-height: 100vh;

}

.container {

  width: 100%;
  padding: 40px 20px 80px;
}

h1 {

  letter-spacing: 1px;
  margin-bottom: 24px;
  padding-bottom: 12px;

}

  margin-bottom: 0.8em;
  opacity: 0;
  animation: fadeIn 0.3s ease forwards;
}

}

  margin-top: 16px;

.choice {

  background: none;
  border: none;
  font: inherit;
  font-size: 1em;
  padding: 6px 0;
  cursor: pointer;
  transition: color 0.1s;
}

.choice:hover {
  color: #ffe8a0;
}

  margin-top: 20px;
  text-align: center;

</style>

<script>
var storyContent = {"inkVersion":21,"root":[[{"->":"downtown"},["done",{"#n":"g-0"}],null],"done",{"downtown":[["^You're standing on the corner of Broadway and Canal, drowning in a river of people who all seem to know exactly where they're going. You do not.","\n","^Your phone buzzes — 12% battery. The group chat has been firing off messages all afternoon, but the last useful ones were:","\n","^\"meet us at the place near the thing\"","\n","^\"you know, by the subway? the good one\"","\n","^\"just ask for Danny\"","\n","^That was forty minutes ago. Since then: silence.","\n","^The March wind cuts between the buildings and straight through your jacket. Somewhere in this city, your friends are having a great time without you.","\n","ev","str","^Scroll back through the group chat","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^Look around for landmarks","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^Ask a stranger for help","/str","/ev",{"*":".^.c-2","flg":4},"ev","str","^Just pick a direction and walk","/str","/ev",{"*":".^.c-3","flg":4},{"c-0":["^ ",{"->":"check_texts"},"\n",null],"c-1":["^ ",{"->":"look_around"},"\n",null],"c-2":["^ ",{"->":"ask_stranger"},"\n",null],"c-3":["^ ",{"->":"pick_direction"},"\n",null]}],null],"check_texts":[["ev",true,"/ev",{"VAR=":"checked_texts","re":true},"ev",{"VAR?":"phone_battery"},3,"-","/ev",{"VAR=":"phone_battery","re":true},"^You shield the screen from the glare and scroll up through the chat. Battery drops to ","ev",{"VAR?":"phone_battery"},"out","/ev","^%.","\n","^Between a string of memes and someone's hot take about pizza, you find a few more clues:","\n","^\"the place with the red awning\"","\n","^\"no wait it's more like maroon\"","\n","^\"it's on a street that starts with M maybe?? or W\"","\n","^\"lol Danny says hi\"","\n","^Who is Danny? You've never heard of a Danny in your life.","\n","^Still — red (or maroon) awning. Street starting with M or W. That's... something.","\n","ev","str","^Look around for a red awning","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^Search the map app before your phone dies","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^Call someone in the group","/str","/ev",{"*":".^.c-2","flg":4},{"c-0":["^ ",{"->":"look_around"},"\n",null],"c-1":["^ ",{"->":"search_map"},"\n",null],"c-2":["^ ",{"->":"call_friend"},"\n",null]}],null],"look_around":["^You scan the streetscape. In every direction: awnings. Green ones, blue ones, black ones. A faded orange one that might have been red in 2003.","\n","ev",{"VAR?":"checked_texts"},"/ev",[{"->":".^.b","c":true},{"b":["\n","^Wait — there. Half a block down, on what a street sign confirms is Mulberry Street: a deep maroon awning over a narrow doorway. No sign, no name. Just a maroon awning and a faint thump of bass from inside.","\n","ev","str","^Head for the maroon awning","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^That's too sketchy — search the map instead","/str","/ev",{"*":".^.c-1","flg":4},{"->":".^.^.^.7"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null],"c-1":["^ ",{"->":"search_map"},"\n",null]}]}],[{"->":".^.b"},{"b":["\n","^None of them mean anything to you. This is Manhattan — every block has forty awnings and none of them are labeled \"your friends are in here.\"","\n","^A taxi honks. A man carrying an improbable number of shopping bags clips your shoulder without slowing down.","\n","ev","str","^Check the group chat for more clues","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^Just pick a direction and walk","/str","/ev",{"*":".^.c-1","flg":4},"ev","str","^Ask a stranger for help","/str","/ev",{"*":".^.c-2","flg":4},{"->":".^.^.^.7"},{"c-0":["^ ",{"->":"check_texts"},"\n",null],"c-1":["^ ",{"->":"pick_direction"},"\n",null],"c-2":["^ ",{"->":"ask_stranger"},"\n",null]}]}],"nop","\n",null],"ask_stranger":["ev",true,"/ev",{"VAR=":"asked_stranger","re":true},"^You stop a woman in a long coat who looks like she might be a local.","\n","^\"Excuse me, do you know a place around here with a red awning? Someone named Danny?\"","\n","^She barely breaks stride. \"Danny? Danny's? Yeah — Mulberry, half a block south. The maroon door.\" She's already gone.","\n","ev",{"VAR?":"phone_battery"},5,">","/ev",[{"->":".^.b","c":true},{"b":["\n","ev","str","^Head to Mulberry Street","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^Text the group that you're coming","/str","/ev",{"*":".^.c-1","flg":4},{"->":".^.^.^.17"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null],"c-1":["^ ",{"->":"text_group"},"\n",null]}]}],[{"->":".^.b"},{"b":["\n","^Your phone is basically dead. No time to text. Just go.","\n","ev","str","^Head to Mulberry Street","/str","/ev",{"*":".^.c-0","flg":4},{"->":".^.^.^.17"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null]}]}],"nop","\n",null],"search_map":["ev",{"VAR?":"phone_battery"},4,"-","/ev",{"VAR=":"phone_battery","re":true},"^You open Maps. The little blue dot spins, trying to find you among the canyon of buildings. Battery: ","ev",{"VAR?":"phone_battery"},"out","/ev","^%.","\n","ev",{"VAR?":"phone_battery"},0,">","/ev",[{"->":".^.b","c":true},{"b":["\n","^The GPS locks in just long enough to show Mulberry Street one block east. There's a cluster of restaurants and bars, but nothing called \"Danny's\" or \"The Place Near The Thing.\"","\n","^Your screen dims — low power mode kicks in.","\n","ev","str","^Head toward Mulberry Street","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^Call someone before your phone dies","/str","/ev",{"*":".^.c-1","flg":4},{"->":".^.^.^.20"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null],"c-1":["^ ",{"->":"call_friend"},"\n",null]}]}],[{"->":".^.b"},{"b":["\n","^The screen flickers and goes black. Your phone is dead.","\n","^You're alone in downtown Manhattan with no map, no contacts, and a vague memory of the word \"Mulberry.\"","\n","ev","str","^Head east and hope for the best","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^Give up and find food on your own","/str","/ev",{"*":".^.c-1","flg":4},{"->":".^.^.^.20"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null],"c-1":["^ ",{"->":"give_up"},"\n",null]}]}],"nop","\n",null],"call_friend":["ev",{"VAR?":"phone_battery"},5,"-","/ev",{"VAR=":"phone_battery","re":true},"ev",{"VAR?":"phone_battery"},0,">","/ev",[{"->":".^.b","c":true},{"b":["\n","^You call Jess. It rings four times, then she picks up — you can hear laughter and music behind her.","\n","^\"WHERE ARE YOU? We're at Danny's!\"","\n","^\"I don't know what Danny's is!\"","\n","^\"It's on Mulberry! The maroon — wait, are you on Canal? Just walk south on Mulberry, you'll see it. Hurry up, Marcos is doing karaoke.\"","\n","^She hangs up. Battery: ","ev",{"VAR?":"phone_battery"},"out","/ev","^%. At least now you know.","\n","ev","str","^Head to Mulberry Street","/str","/ev",{"*":".^.c-0","flg":4},{"->":".^.^.^.13"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null]}]}],[{"->":".^.b"},{"b":["\n","^You hear half a ring, then silence. The screen goes black. Dead.","\n","^But you caught Jess's voice for half a second — and behind it, the unmistakable sound of very bad karaoke. Mulberry Street. Has to be.","\n","ev","str","^Head east toward the sound of terrible singing","/str","/ev",{"*":".^.c-0","flg":4},{"->":".^.^.^.13"},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null]}]}],"nop","\n",null],"text_group":[["ev",{"VAR?":"phone_battery"},2,"-","/ev",{"VAR=":"phone_battery","re":true},"^You fire off a text: \"omw - mulberry right?\"","\n","^Three dots appear. Then: \"YES HURRY danny says he's saving you a seat\"","\n","^Who IS Danny??","\n","^Battery: ","ev",{"VAR?":"phone_battery"},"out","/ev","^%.","\n","ev","str","^Head to Mulberry Street","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null]}],null],"pick_direction":[["^You pick east, because east feels right. Or maybe because the wind is coming from the west and you're freezing.","\n","^Two blocks later, you're on a quieter street. The chaos of Canal fades behind you. Here the buildings are shorter, the storefronts smaller. Old Italian bakeries next to new bubble tea shops.","\n","^A hand-painted sign in a window reads: \"Danny's — No Sign Needed.\" Below it, a maroon awning.","\n","^You stop. This can't be that easy. Can it?","\n","ev","str","^Go inside","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ",{"->":"maroon_awning"},"\n",null]}],null],"maroon_awning":[["^You push through the heavy wooden door under the maroon awning.","\n","^Inside: warm light, exposed brick, a long bar, and a sound system playing something between jazz and hip-hop. The place is packed but not suffocating. It smells like garlic and old wood.","\n","^And there — in the back corner, crammed around a table that's too small for them — are your friends. Jess waves frantically. Marcos is holding a karaoke mic like a weapon. Someone you don't recognize is pouring drinks.","\n","^\"FINALLY!\" Jess shouts over the music.","\n","ev",{"VAR?":"asked_stranger"},"/ev",[{"->":".^.b","c":true},{"b":["^ \"A woman on the street told me about this place,\" you say. \"How does everyone know Danny's except me?\"",{"->":".^.^.^.12"},null]}],"nop","\n","ev",{"VAR?":"checked_texts"},"/ev",[{"->":".^.b","c":true},{"b":["^ \"Your directions were terrible,\" you say, dropping into the empty chair. \"A street that starts with M or W?\"",{"->":".^.^.^.18"},null]}],"nop","\n","ev",{"VAR?":"checked_texts"},"!",{"VAR?":"asked_stranger"},"!","&&","/ev",[{"->":".^.b","c":true},{"b":["^ \"I literally just walked in a random direction and ended up here,\" you say.",{"->":".^.^.^.28"},null]}],"nop","\n","^The stranger pouring drinks leans over and extends a hand. \"I'm Danny. Welcome. First drink's on me — you look like you've earned it.\"","\n","^So that's Danny.","\n","ev","str","^Sit down and order something warm","/str","/ev",{"*":".^.c-0","flg":4},"ev","str","^\"How does everyone know you except me?\"","/str","/ev",{"*":".^.c-1","flg":4},{"c-0":["^ ",{"->":"the_end"},"\n",null],"c-1":["^ ",{"->":"ask_danny"},"\n",null]}],null],"ask_danny":[["^Danny grins. \"I know everyone. I'm the bartender. And the owner. And the guy who fixes the radiator. You're the last of the group — Jess wouldn't shut up about you.\"","\n","^\"She said you'd get lost.\"","\n","^\"She was right.\"","\n","^Danny slides a drink across the table. Something amber and warm. \"On the house. Anyone who can find this place without a sign deserves a free one.\"","\n","ev","str","^Take the drink and settle in","/str","/ev",{"*":".^.c-0","flg":4},{"c-0":["^ ",{"->":"the_end"},"\n",null]}],null],"give_up":["^You find a small dumpling shop on the corner and slide into a window seat alone. The dumplings are perfect — crispy on the bottom, soup inside.","\n","^Your phone is dead. Your friends are somewhere. But honestly? This is fine. The city hums around you, warm broth steams up the window, and for the first time all night, you stop rushing.","\n","^Maybe they'll find you instead.","\n","end",null],"the_end":["^The evening unfolds the way good evenings do — slowly and then all at once. Marcos butchers three songs. Jess tells the story of how you once got lost in a mall parking lot for forty-five minutes. Danny keeps the drinks coming and laughs at everything.","\n","^Outside, the city roars on without you. But in here, under the maroon awning on Mulberry Street, you've finally arrived.","\n","end",null],"global decl":["ev",12,{"VAR=":"phone_battery"},false,{"VAR=":"checked_texts"},false,{"VAR=":"asked_stranger"},"/ev","end",null]}],"listDefs":{}};
var story = new inkjs.Story(storyContent);
var storyEl = document.getElementById('story');
var choicesEl = document.getElementById('choices');

function continueStory() {
  while (story.canContinue) {
    var text = story.Continue().trim();
    if (text) {
      var p = document.createElement('p');
      p.innerHTML = text;
      storyEl.appendChild(p);
    }
  }

  choicesEl.innerHTML = '';

  if (story.currentChoices.length > 0) {
    story.currentChoices.forEach(function(choice, i) {
      var btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = (i + 1) + '. ' + choice.text;
      btn.onclick = function() {
        choicesEl.innerHTML = '';
        story.ChooseChoiceIndex(i);
        continueStory();
      };
      choicesEl.appendChild(btn);
    });
  } else {
    var end = document.createElement('p');
    end.id = 'end';
    end.textContent = '\u2014 End \u2014';
    storyEl.appendChild(end);
  }

  window.scrollTo(0, document.body.scrollHeight);
}

continueStory();
</script>
